<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    padding: 0;
    /* This perfectly centers the video inside the Google Sites box */
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    background: rgb(219,224,241); /* Matching your site's background */
    overflow: hidden;
  }

  video {
    /* This makes it responsive but prevents it from getting TOO huge on a PC */
    width: 100%;
    max-width: 800px; 
    
    /* This forces the perfect 4:3 ratio no matter what */
    aspect-ratio: 4 / 3; 
    
    /* Keeps the video perfectly contained inside its box */
    object-fit: contain; 
    
    /* Optional: Adds a tiny rounded corner to match modern web design. 
       Change to 0px if you want sharp square corners! */
    border-radius: 8px; 
  }
</style>
</head>
<body>

  <video src="start.mp4" autoplay muted loop playsinline controls></video>

</body>
</html>
